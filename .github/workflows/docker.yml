name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  # Keyless cosign signing via the GitHub OIDC token (no private key to manage).
  id-token: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.image }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: server
            context: .
            dockerfile: Dockerfile
          - image: monitoring
            context: apps/monitoring
            dockerfile: apps/monitoring/Dockerfile
          - image: ca-issuer
            context: apps/ca-issuer
            dockerfile: apps/ca-issuer/Dockerfile
          - image: gateway
            context: apps/gateway
            dockerfile: apps/gateway/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          # repository_owner is lower-case (ghcr requires lower-case paths).
          images: ghcr.io/${{ github.repository_owner }}/adminhelper/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
          # latest=auto -> tagged "latest" only on a (non-prerelease) semver tag.

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Install cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          # In-toto SLSA provenance + SBOM attestations attached to the image.
          provenance: mode=max
          sbom: true

      # Keyless signature over the pushed digest (covers every tag pointing at
      # it). Verifiable with:
      #   cosign verify ghcr.io/ks98/adminhelper/<image> \
      #     --certificate-identity-regexp 'https://github.com/ks98/AdminHelper/.*' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Sign the image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/adminhelper/${{ matrix.image }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
