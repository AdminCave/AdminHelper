name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FRP_VERSION: "0.69.1"
  # Pinned SHA-256 of the official frp release artifacts (verified before use).
  FRP_SHA256_LINUX_AMD64: "7be257b72dbbc60bcb3e0e25a5afd1dfac7b63f897084864d3c956dd3d5674e1"
  FRP_SHA256_WINDOWS_AMD64: "829ac915f8655d4d4e021b8db61b46c3445205ed80d32b04cda7fa89d87c46e0"

jobs:
  server:
    name: Server (pytest, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: adminhelper
          POSTGRES_PASSWORD: cipw
          POSTGRES_DB: adminhelper
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U adminhelper -d adminhelper"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # conftest.py uses DATABASE_URL directly when set (CI mode) instead of
      # spinning up a testcontainers Postgres. postgresql:// is normalised to
      # the psycopg3 driver inside conftest.
      DATABASE_URL: postgresql+psycopg://adminhelper:cipw@localhost:5432/adminhelper
      DATA_DIR: /tmp/adminhelper-test-data
      SECRET_KEY: ci-test-secret-key
      ADMIN_PASSWORD: ciadmin
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: apps/server/requirements*
      - name: Install dependencies
        working-directory: apps/server
        # requirements-dev.txt pulls in requirements.in (loose, unhashed); the
        # hashed requirements.txt lock is for the Docker image, not the tests.
        run: pip install -r requirements-dev.txt
      - name: Run pytest
        working-directory: apps/server
        # Coverage is report-only (no threshold) — visibility, not a gate.
        run: pytest -q --cov=app --cov-report=term

  python-lint:
    name: Python (ruff check + format)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Install ruff
        # Pin ruff: a new release changes format rules / adds lints and would red every
        # open PR with no code change, and is unreproducible against a local ruff. Keep
        # in sync with the ruff floor in apps/server/requirements-dev.txt (4.88).
        run: pip install ruff==0.15.20
      - name: ruff check
        run: ruff check apps/server apps/monitoring
      - name: ruff format --check
        run: ruff format --check apps/server apps/monitoring

  monitoring:
    name: Monitoring (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      # Only consumed by tests/test_migrations_smoke.py (alembic upgrade head
      # against a fresh DB); all other monitoring tests stay DB-free.
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: adminhelper
          POSTGRES_PASSWORD: cipw
          POSTGRES_DB: adminhelper_monitor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U adminhelper -d adminhelper_monitor"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://adminhelper:cipw@localhost:5432/adminhelper_monitor
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: apps/monitoring/requirements*
      - name: Install dependencies
        working-directory: apps/monitoring
        # requirements.in is the loose, unhashed source; the hashed requirements.txt
        # lock is for the Docker image.
        run: pip install -r requirements.in pytest pytest-cov
      - name: Run pytest
        working-directory: apps/monitoring
        # Coverage is report-only (no threshold) — visibility, not a gate.
        run: python -m pytest -q --cov=app --cov-report=term

  ca-issuer:
    name: CA-Issuer (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: apps/ca-issuer/requirements*
      - name: Install dependencies
        working-directory: apps/ca-issuer
        # requirements.in is the loose source; the hashed requirements.txt is for the image.
        run: pip install -r requirements.in pytest
      - name: Run pytest
        working-directory: apps/ca-issuer
        # Tests opt into the in-memory token store (no DATABASE_URL) — no DB service needed (6.3/6.4).
        run: python -m pytest -q

  agent:
    name: Go Agent (gofmt + vet + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.25"
          cache-dependency-path: apps/agent/go.sum
      - name: gofmt
        working-directory: apps/agent
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needs to be run on:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        working-directory: apps/agent
        run: go vet ./...
      - name: go vet (windows)
        working-directory: apps/agent
        # The ubuntu runner's default `go vet` never sees the //go:build windows files (the sc-query
        # collector). Vet them explicitly so a Windows-only parser bug is caught in CI (6.20).
        run: GOOS=windows go vet ./...
      - name: go test
        working-directory: apps/agent
        # Coverage is report-only (no threshold) — visibility, not a gate.
        run: go test -cover ./...
      - name: Cross-compile (linux + windows)
        working-directory: apps/agent
        run: |
          GOOS=linux GOARCH=amd64 go build -o /dev/null ./cmd/adminhelper-agent
          GOOS=windows GOARCH=amd64 go build -o /dev/null ./cmd/adminhelper-agent

  desktop-ui:
    name: Desktop-UI (svelte-check + lint + vitest) + E2E lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/desktop/ui/package-lock.json
            apps/desktop/e2e/package-lock.json
      - name: npm ci
        working-directory: apps/desktop/ui
        run: npm ci --no-audit --no-fund
      - name: svelte-check
        working-directory: apps/desktop/ui
        run: npm run check
      - name: eslint + prettier
        working-directory: apps/desktop/ui
        run: npm run lint
      - name: vitest
        working-directory: apps/desktop/ui
        # Coverage is report-only (no threshold) — visibility, not a gate.
        run: npm run test -- --coverage
      - name: E2E specs npm ci
        working-directory: apps/desktop/e2e
        run: npm ci --no-audit --no-fund
      - name: E2E eslint
        working-directory: apps/desktop/e2e
        run: npm run lint

  frontend:
    name: Web-Frontend (check + lint + unit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: npm ci
        working-directory: apps/web
        run: npm ci --no-audit --no-fund
      - name: svelte-check
        working-directory: apps/web
        run: npm run check
      - name: eslint + prettier
        working-directory: apps/web
        run: npm run lint
      - name: vitest
        working-directory: apps/web
        # Coverage is report-only (no threshold) — visibility, not a gate.
        run: npm run test:unit -- --coverage

  frontend-e2e:
    name: Web-Frontend (Playwright E2E)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: npm ci
        working-directory: apps/web
        run: npm ci --no-audit --no-fund
      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps
      - name: Playwright test
        working-directory: apps/web
        run: npx playwright test
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          retention-days: 7

  rust:
    name: Desktop-Backend (fmt + clippy + test)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev libxdo-dev \
            libayatana-appindicator3-dev libssl-dev patchelf file
      - name: frpc sidecar (externalBin must resolve for tauri-build)
        run: |
          curl -fsSL -o frpc.tar.gz \
            "https://github.com/fatedier/frp/releases/download/v${FRP_VERSION}/frp_${FRP_VERSION}_linux_amd64.tar.gz"
          echo "${FRP_SHA256_LINUX_AMD64}  frpc.tar.gz" | sha256sum -c -
          tar xzf frpc.tar.gz
          mkdir -p apps/desktop/src-tauri/binaries
          cp "frp_${FRP_VERSION}_linux_amd64/frpc" \
            apps/desktop/src-tauri/binaries/frpc-x86_64-unknown-linux-gnu
          chmod +x apps/desktop/src-tauri/binaries/frpc-x86_64-unknown-linux-gnu
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: cargo fmt
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --check
      - name: cargo clippy
        working-directory: apps/desktop/src-tauri
        run: cargo clippy -- -D warnings
      - name: cargo test
        working-directory: apps/desktop/src-tauri
        run: cargo test

  # Audit C1: the windows = "0.61" code paths were never compiled in CI —
  # "green but broken" releases were possible. cargo check is the cheap gate;
  # the full MSI build stays in release.yml.
  rust-windows:
    name: Desktop-Backend (cargo check, Windows)
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: frpc sidecar (externalBin must resolve for tauri-build)
        shell: bash
        run: |
          curl -fsSL -o frpc.zip \
            "https://github.com/fatedier/frp/releases/download/v${FRP_VERSION}/frp_${FRP_VERSION}_windows_amd64.zip"
          echo "${FRP_SHA256_WINDOWS_AMD64}  frpc.zip" | sha256sum -c -
          unzip -o frpc.zip
          mkdir -p apps/desktop/src-tauri/binaries
          cp "frp_${FRP_VERSION}_windows_amd64/frpc.exe" \
            apps/desktop/src-tauri/binaries/frpc-x86_64-pc-windows-msvc.exe
      - name: cargo check
        working-directory: apps/desktop/src-tauri
        run: cargo check --locked

  # Audit C2: cargo tauri build (beforeBuildCommand, UI embedding, deb
  # bundling) only ran on tags — exactly the failure class of
  # fix/tauri-beforebuild-path surfaced at release time. Debug profile +
  # deb-only keeps it affordable as a PR gate.
  tauri-build-smoke:
    name: Desktop (tauri build smoke, Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev libxdo-dev \
            libayatana-appindicator3-dev libssl-dev patchelf file
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/desktop/src-tauri
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/ui/package-lock.json
      - name: Install Tauri CLI
        # Keep this pin in lockstep with release.yml.
        run: cargo install tauri-cli --locked --version "2.11.2"
      - name: frpc sidecar
        run: |
          curl -fsSL -o frpc.tar.gz \
            "https://github.com/fatedier/frp/releases/download/v${FRP_VERSION}/frp_${FRP_VERSION}_linux_amd64.tar.gz"
          echo "${FRP_SHA256_LINUX_AMD64}  frpc.tar.gz" | sha256sum -c -
          tar xzf frpc.tar.gz
          mkdir -p apps/desktop/src-tauri/binaries
          cp "frp_${FRP_VERSION}_linux_amd64/frpc" \
            apps/desktop/src-tauri/binaries/frpc-x86_64-unknown-linux-gnu
          chmod +x apps/desktop/src-tauri/binaries/frpc-x86_64-unknown-linux-gnu
      - name: npm ci
        working-directory: apps/desktop/ui
        run: npm ci --no-audit --no-fund
      - name: cargo tauri build (debug, deb only)
        working-directory: apps/desktop/src-tauri
        run: cargo tauri build --debug --bundles deb

  # Audit C3: docker images were only built on pushes to main — a Dockerfile
  # break (e.g. hash mismatch under --require-hashes) landed on main first.
  docker-build:
    name: ${{ matrix.image }} image (build only)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: server
            context: .
            dockerfile: Dockerfile
          - image: monitoring
            context: apps/monitoring
            dockerfile: apps/monitoring/Dockerfile
          - image: ca-issuer
            context: apps/ca-issuer
            dockerfile: apps/ca-issuer/Dockerfile
          - image: gateway
            context: apps/gateway
            dockerfile: apps/gateway/Dockerfile
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # Audit C7: FRP_VERSION (+ artifact SHAs) is pinned in four places that must move
  # in lockstep — drift breaks the tunnel at runtime, not in CI. The crabbox heavy-
  # test bootstrap (scripts/tests/crabbox_bootstrap.sh) stages the same frpc sidecar
  # and is the 4th pin.
  frp-consistency:
    name: Pinned versions + signing key in lockstep
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Compare the four FRP_VERSION pins
        run: |
          ci=$(grep -m1 '^  FRP_VERSION:' .github/workflows/ci.yml | grep -o '[0-9][0-9.]*')
          rel=$(grep -m1 '^  FRP_VERSION:' .github/workflows/release.yml | grep -o '[0-9][0-9.]*')
          # Extract only the version tag; the image may carry a trailing
          # @sha256:<digest> pin whose hex would otherwise leak into the match.
          compose=$(grep -m1 'snowdreamtech/frps:' docker-compose.yml | sed -E 's#.*snowdreamtech/frps:([0-9][0-9.]*).*#\1#')
          boot=$(grep -m1 'FRP_VERSION=' scripts/tests/crabbox_bootstrap.sh | grep -o '[0-9][0-9.]*' | head -1)
          sha_ci=$(grep -m1 'FRP_SHA256_LINUX_AMD64:' .github/workflows/ci.yml | grep -o '[0-9a-f]\{64\}')
          sha_rel=$(grep -m1 'FRP_SHA256_LINUX_AMD64:' .github/workflows/release.yml | grep -o '[0-9a-f]\{64\}')
          sha_boot=$(grep -m1 'FRP_SHA256_LINUX_AMD64=' scripts/tests/crabbox_bootstrap.sh | grep -o '[0-9a-f]\{64\}')
          echo "ci.yml=$ci release.yml=$rel docker-compose.yml=$compose crabbox_bootstrap=$boot"
          test -n "$ci" && test "$ci" = "$rel" && test "$ci" = "$compose" && test "$ci" = "$boot" || {
            echo "::error::FRP_VERSION drift (ci=$ci, release=$rel, compose=$compose, bootstrap=$boot)"; exit 1; }
          test "$sha_ci" = "$sha_rel" && test "$sha_ci" = "$sha_boot" || {
            echo "::error::FRP_SHA256_LINUX_AMD64 differs across ci.yml/release.yml/crabbox_bootstrap.sh"; exit 1; }
          # Windows SHA (ci vs release): a FRP_VERSION bump that updates only the ci copy
          # makes release.yml's desktop-windows `sha256sum -c` fail, and since that build
          # is continue-on-error the MSI silently drops from the release (4.22).
          sha_win_ci=$(grep -m1 'FRP_SHA256_WINDOWS_AMD64:' .github/workflows/ci.yml | grep -o '[0-9a-f]\{64\}')
          sha_win_rel=$(grep -m1 'FRP_SHA256_WINDOWS_AMD64:' .github/workflows/release.yml | grep -o '[0-9a-f]\{64\}')
          test -n "$sha_win_ci" && test "$sha_win_ci" = "$sha_win_rel" || {
            echo "::error::FRP_SHA256_WINDOWS_AMD64 differs between ci.yml and release.yml"; exit 1; }
          # tauri-cli pin (ci vs release): the 'Keep in lockstep' comment isn't enforced anywhere (4.22).
          tauri_ci=$(grep -m1 'cargo install tauri-cli' .github/workflows/ci.yml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          tauri_rel=$(grep -m1 'cargo install tauri-cli' .github/workflows/release.yml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          test -n "$tauri_ci" && test "$tauri_ci" = "$tauri_rel" || {
            echo "::error::tauri-cli pin differs (ci=$tauri_ci, release=$tauri_rel)"; exit 1; }
      - name: MINISIGN_PUBKEY in lockstep (install.sh vs update.sh)
        run: |
          ins=$(grep -m1 '^MINISIGN_PUBKEY=' scripts/install.sh | cut -d'"' -f2)
          upd=$(grep -m1 '^MINISIGN_PUBKEY=' scripts/update.sh | cut -d'"' -f2)
          echo "install.sh=$ins update.sh=$upd"
          test -n "$ins" && test "$ins" = "$upd" || {
            echo "::error::MINISIGN_PUBKEY drift (install=$ins, update=$upd) — a key rotation must touch both, else updates verify against the old key and break on every existing install"; exit 1; }

  # Lint the host ops scripts and run the hermetic update.sh sandbox test (fake
  # release over file://, stubbed docker — no real stack). --severity=warning so
  # pre-existing info-level notes don't gate; the new scripts are clean at default.
  ops-scripts:
    name: Ops scripts (shellcheck + update test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: shellcheck
        run: shellcheck --severity=warning scripts/*.sh scripts/tests/*.sh
      # minisign lets the sandbox test exercise the (now armed) release-signature
      # verification path end-to-end with a throwaway key.
      - name: Install minisign
        run: sudo apt-get update -qq && sudo apt-get install -y -qq minisign
      - name: update.sh sandbox test
        run: bash scripts/tests/update_test.sh
      - name: install.sh sandbox test
        run: bash scripts/tests/install_test.sh
      - name: init-secrets + uninstall + restore-guard tests
        run: bash scripts/tests/init-secrets_test.sh && bash scripts/tests/uninstall_test.sh && bash scripts/tests/restore_guard_test.sh && bash scripts/tests/gateway_mtls_test.sh
      - name: diagnostics.sh redaction test
        run: bash scripts/tests/diagnostics_test.sh

  gateway-config:
    name: Gateway (nginx -t)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      # Syntax-check the single public TLS edge on every PR: the integration-stack
      # job below skips PRs and docker.yml only builds on releases, so a broken
      # nginx.conf (bad directive, missing snippet include) would otherwise merge and
      # only surface on the next main push (6.47). Throwaway certs + a stub mtls
      # snippet + the real identity snippet let `nginx -t` load the full config.
      - name: nginx -t with throwaway certs
        run: |
          mkdir -p certs snippets
          openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:P-256 -nodes \
            -keyout certs/gateway.key -out certs/gateway-fullchain.pem -subj /CN=t -days 1
          cp certs/gateway-fullchain.pem certs/client-ca.pem
          echo 'ssl_verify_client optional;' > snippets/data-plane-mtls.conf
          cp apps/gateway/identity-headers.conf snippets/identity-headers.conf
          docker run --rm \
            -v "$PWD/apps/gateway/nginx.conf:/etc/nginx/nginx.conf:ro" \
            -v "$PWD/certs:/etc/nginx/certs:ro" \
            -v "$PWD/snippets:/etc/nginx/snippets:ro" \
            nginx:1.29-alpine nginx -t

  # The ONE from-outside integration path. Every other test mocks at the DB/IPC
  # boundary; this boots the real multi-container stack (postgres, redis, server,
  # ca-issuer, gateway) with MTLS_ENFORCE=true and talks to it only through the
  # nginx gateway — exercising the full enrollment + mTLS + JWT round-trip end to
  # end. The script builds the images it needs from this checkout.
  #
  # Deliberately NOT a per-PR gate yet: it builds the server image (incl. the web
  # frontend) and boots a five-container stack — minutes, not seconds. Runs on
  # main pushes + manual dispatch; promote to `pull_request` once we've lived a
  # release round with it.
  integration-stack:
    name: From-outside stack (mTLS gateway)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: From-outside mTLS integration test
        run: bash scripts/tests/integration_stack_test.sh

  # NOTE: the desktop E2E (WebdriverIO + tauri-driver smoke) is deliberately NOT
  # a CI job. Like the desktop *.live.js journeys it drives a real WebKit window
  # headless under xvfb — a chain (tauri-driver → WebKitWebDriver → WebKit) that
  # drifts with the runner image + ungated upstream tool versions, so it flaked
  # and reddened main without signalling a real defect. It runs locally/manually:
  #   cd apps/desktop/e2e && xvfb-run -a npm test
  # See apps/desktop/e2e/README.md.
