name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

# A deleted+re-pushed tag (the usual "re-run the release" move) would otherwise start a
# second run parallel to the first, both writing the same draft with mixed assets (4.89).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FRP_VERSION: "0.69.1"
  # Pinned SHA-256 of the official frp release artifacts (verified before use).
  FRP_SHA256_LINUX_AMD64: "7be257b72dbbc60bcb3e0e25a5afd1dfac7b63f897084864d3c956dd3d5674e1"
  FRP_SHA256_WINDOWS_AMD64: "829ac915f8655d4d4e021b8db61b46c3445205ed80d32b04cda7fa89d87c46e0"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Desktop client: Tauri bundles (.deb + .rpm) and the raw ELF binary.
  # Tauri bundles the RPM via the Rust `rpm` crate, so no system rpmbuild needed.
  # ─────────────────────────────────────────────────────────────────────────
  desktop-linux:
    name: Desktop (deb/rpm/bin, Linux)
    # Only on a tag: a workflow_dispatch from a branch yields VERSION=main (non-semver),
    # failing build-deb/rpm after a full build and burning runner minutes (4.90).
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev libxdo-dev \
            libayatana-appindicator3-dev libssl-dev patchelf file
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/desktop/src-tauri
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/ui/package-lock.json
      - name: Install Tauri CLI
        # Exact pin (audit C6): "^2" floated to whatever was newest at build
        # time — a tauri-cli release could break a tag build and made release
        # builds non-reproducible. Keep in lockstep with ci.yml.
        run: cargo install tauri-cli --locked --version "2.11.2"
      - name: frpc sidecar
        run: |
          curl -fsSL -o frpc.tar.gz \
            "https://github.com/fatedier/frp/releases/download/v${FRP_VERSION}/frp_${FRP_VERSION}_linux_amd64.tar.gz"
          echo "${FRP_SHA256_LINUX_AMD64}  frpc.tar.gz" | sha256sum -c -
          tar xzf frpc.tar.gz
          mkdir -p apps/desktop/src-tauri/binaries
          cp "frp_${FRP_VERSION}_linux_amd64/frpc" \
            apps/desktop/src-tauri/binaries/frpc-x86_64-unknown-linux-gnu
          chmod +x apps/desktop/src-tauri/binaries/frpc-x86_64-unknown-linux-gnu
      - name: npm ci
        working-directory: apps/desktop/ui
        run: npm ci --no-audit --no-fund
      - name: Build bundles
        working-directory: apps/desktop/src-tauri
        run: cargo tauri build --bundles deb,rpm
      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp apps/desktop/src-tauri/target/release/bundle/deb/*.deb dist/
          cp apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm dist/
          cp apps/desktop/src-tauri/target/release/adminhelper dist/adminhelper-desktop-linux-x86_64
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: desktop-linux
          path: dist/
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────
  # Go agent: linux + windows binaries, plus .deb and .rpm (bundling frpc).
  # ─────────────────────────────────────────────────────────────────────────
  agent:
    name: Go Agent (deb/rpm/bins)
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.25"
          cache-dependency-path: apps/agent/go.sum
      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build binaries
        working-directory: apps/agent
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          GOOS=linux GOARCH=amd64 go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o bin/adminhelper-agent ./cmd/adminhelper-agent
          GOOS=windows GOARCH=amd64 go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o bin/adminhelper-agent.exe ./cmd/adminhelper-agent
      - name: Download frpc (bundled into deb/rpm)
        run: |
          curl -fsSL -o frpc.tar.gz \
            "https://github.com/fatedier/frp/releases/download/v${FRP_VERSION}/frp_${FRP_VERSION}_linux_amd64.tar.gz"
          echo "${FRP_SHA256_LINUX_AMD64}  frpc.tar.gz" | sha256sum -c -
          tar xzf frpc.tar.gz
          cp "frp_${FRP_VERSION}_linux_amd64/frpc" ./frpc
          chmod +x frpc
      - name: Build .deb
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg-dev
          VERSION="$VERSION" bash apps/agent/build-deb.sh
      - name: Build .rpm
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          sudo apt-get install -y --no-install-recommends rpm
          VERSION="$VERSION" bash apps/agent/build-rpm.sh
      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp adminhelper-agent_*.deb dist/
          cp adminhelper-agent-*.rpm dist/
          cp apps/agent/bin/adminhelper-agent dist/adminhelper-agent-linux-x86_64
          cp apps/agent/bin/adminhelper-agent.exe dist/adminhelper-agent-windows-x86_64.exe
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: agent
          path: dist/
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────
  # Desktop client on Windows (MSI). Best-effort: first time this runs on a
  # GitHub Windows runner; failures must not block the release. If it fails,
  # the MSI is simply absent from the draft and can be added in a follow-up.
  # ─────────────────────────────────────────────────────────────────────────
  desktop-windows:
    name: Desktop (MSI, Windows, best-effort)
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/desktop/src-tauri
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/ui/package-lock.json
      - name: Install Tauri CLI
        # Exact pin (audit C6): "^2" floated to whatever was newest at build
        # time — a tauri-cli release could break a tag build and made release
        # builds non-reproducible. Keep in lockstep with ci.yml.
        run: cargo install tauri-cli --locked --version "2.11.2"
      - name: frpc sidecar (windows)
        shell: bash
        run: |
          curl -fsSL -o frpc.zip \
            "https://github.com/fatedier/frp/releases/download/v${FRP_VERSION}/frp_${FRP_VERSION}_windows_amd64.zip"
          echo "${FRP_SHA256_WINDOWS_AMD64}  frpc.zip" | sha256sum -c -
          unzip -o frpc.zip
          mkdir -p apps/desktop/src-tauri/binaries
          cp "frp_${FRP_VERSION}_windows_amd64/frpc.exe" \
            apps/desktop/src-tauri/binaries/frpc-x86_64-pc-windows-msvc.exe
      - name: npm ci
        working-directory: apps/desktop/ui
        run: npm ci --no-audit --no-fund
      - name: Build MSI
        working-directory: apps/desktop/src-tauri
        run: cargo tauri build --bundles msi
      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp apps/desktop/src-tauri/target/release/bundle/msi/*.msi dist/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: desktop-windows
          path: dist/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────
  # Gather every artifact, build SHA256SUMS, publish a DRAFT release.
  # draft: true -> nothing is public until a human presses "Publish".
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: Draft GitHub Release
    needs: [desktop-linux, agent, desktop-windows]
    # Gate on the MANDATORY Linux builds only. desktop-windows is best-effort
    # (continue-on-error), so its failure must not block the draft — but a
    # failed desktop-linux or agent build must, to avoid a partial-asset draft
    # that looks complete while missing core assets.
    if: ${{ !cancelled() && needs.desktop-linux.result == 'success' && needs.agent.result == 'success' && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      # The agent + Docker images derive their version from the tag, but the
      # desktop version lives in tauri.conf.json and is bumped by hand — assert
      # it matches the tag so a forgotten bump fails the release, not a user.
      - name: Verify the desktop version matches the tag
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"
          tauri=$(grep -m1 '"version"' apps/desktop/src-tauri/tauri.conf.json | grep -o '[0-9][0-9.]*' | head -1)
          test "$tauri" = "$VER" || { echo "::error::tauri.conf.json version ($tauri) != tag ($VER)"; exit 1; }
          echo "version OK: $VER"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
      # The release-bound updater (scripts/update.sh) consumes ONE versioned asset:
      # the runtime bundle. Its MANIFEST.sha256 + VERSION let the host verify and
      # atomically swap exactly this release's runtime files (compose + ops scripts).
      - name: Build runtime bundle
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          mkdir -p release stage/scripts
          cp docker-compose.yml .env.example stage/
          cp scripts/install.sh scripts/update.sh scripts/init-secrets.sh \
             scripts/pg-backup.sh scripts/backup.sh scripts/restore.sh \
             scripts/uninstall.sh scripts/diagnostics.sh stage/scripts/
          printf '%s\n' "$TAG" > stage/VERSION
          ( cd stage && find docker-compose.yml .env.example scripts -type f | sort \
              | xargs sha256sum > MANIFEST.sha256 )
          tar czf "release/adminhelper-runtime-${TAG}.tar.gz" -C stage .
          echo "=== runtime bundle ==="; tar tzf "release/adminhelper-runtime-${TAG}.tar.gz"
      # The agent package repo (GPG-signed apt + rpm) as ONE asset the updater
      # drops into the gateway's ./repo. Built BEFORE "Flatten and checksum" so it
      # lands in SHA256SUMS (and thus the minisign signature). Skips with a warning
      # until REPO_GPG_PRIVATE_KEY is configured — like MINISIGN_SECRET_KEY it must
      # never block a release. Generate a PASSPHRASE-LESS key once, store
      # `gpg --export-secret-keys --armor <KEYID> | base64 -w0` as the secret, and
      # pin the public key in the docs + client setup snippet (docs/.../cicd).
      - name: Build signed agent repo (apt + rpm)
        env:
          REPO_GPG_PRIVATE_KEY: ${{ secrets.REPO_GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${REPO_GPG_PRIVATE_KEY:-}" ]; then
            echo "::error::REPO_GPG_PRIVATE_KEY not set — the signed agent repo is mandatory (its fingerprint is pinned in the docs + client setup). A release without it silently leaves the fleet on the old repo — no new version, no error, no staleness signal (4.23)."
            exit 1
          fi
          TAG="${GITHUB_REF_NAME}"; VER="${TAG#v}"
          mkdir -p release
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev apt-utils createrepo-c rpm gnupg
          export GNUPGHOME="$(mktemp -d)"; chmod 700 "$GNUPGHOME"
          # The decrypted repo signing key lives here — drop it when the step ends (even
          # on failure) so it isn't on disk while later third-party steps run (3.53).
          trap 'rm -rf "$GNUPGHOME"' EXIT
          printf '%s' "$REPO_GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import 2>/dev/null \
            || { echo "::error::REPO_GPG_PRIVATE_KEY must be base64 of an exported secret key: gpg --export-secret-keys --armor <KEYID> | base64 -w0"; exit 1; }
          KEY_ID="$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/{print $10; exit}')"
          # Assert the imported key matches the fingerprint pinned in the docs + client
          # setup (docs/admin/agent-deployment.html). A rotated/wrong/typo'd secret would
          # otherwise sign with a key the fleet's pinned keyring rejects (apt update
          # breaks), unnoticed until the field instead of failing here in CI (4.24).
          EXPECTED_FPR="912E1EC637F49C978EAD47DF926B404297E9DC1C"
          [ "$KEY_ID" = "$EXPECTED_FPR" ] || { echo "::error::imported signing key $KEY_ID != pinned $EXPECTED_FPR — wrong REPO_GPG_PRIVATE_KEY? (keep in sync with docs/admin/agent-deployment)"; exit 1; }
          DEB="$(ls artifacts/agent/adminhelper-agent_*_amd64.deb | head -1)"
          RPM="$(ls artifacts/agent/adminhelper-agent-*.x86_64.rpm | head -1)"
          VERSION="$VER" REPO_GPG_KEY_ID="$KEY_ID" OUT_DIR=repo DEB="$DEB" RPM="$RPM" \
            bash apps/agent/build-repo.sh
          tar czf "release/adminhelper-agent-repo-${TAG}.tar.gz" -C repo .
          # Also publish the archive keyring as its OWN asset — a second, independent
          # channel so an admin can fetch it and fingerprint-verify it against
          # SHA256SUMS + minisign, instead of only trusting the certless :8445 repo
          # plane it is meant to authenticate (3.21).
          cp repo/apt/adminhelper-archive-keyring.gpg release/
          # sed (not head) reads the whole stream, so tar never gets SIGPIPE — `tar | head`
          # under `set -o pipefail` fails the step with exit 2 once the listing exceeds 10 lines.
          echo "=== agent repo bundle ==="; tar tzf "release/adminhelper-agent-repo-${TAG}.tar.gz" | sed -n '1,10p'
      - name: Flatten and checksum
        run: |
          find artifacts -type f -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS
          echo "=== Release assets ==="
          ls -lah
      # Sign SHA256SUMS so install.sh/update.sh can verify authenticity, not just
      # transport integrity (the bundle and SHA256SUMS come from the same origin).
      # Fails the release if MINISIGN_SECRET_KEY is missing: install.sh/update.sh are
      # armed (public key pinned) and reject unsigned releases, so an unsigned draft
      # would break every install/update in the field. Generate a passwordless CI key
      # once with `minisign -G -W`, store its secret-key file as the
      # MINISIGN_SECRET_KEY secret, and pin the matching public key in
      # scripts/install.sh + scripts/update.sh to arm it.
      - name: Sign SHA256SUMS (minisign)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            echo "::error::MINISIGN_SECRET_KEY missing — install.sh/update.sh are armed and reject unsigned releases."
            exit 1
          fi
          sudo apt-get update -qq && sudo apt-get install -y -qq minisign
          # The secret is the base64 of the minisign.key FILE (`base64 -w0 minisign.key`),
          # which is paste-safe — a raw multi-line key easily gets its base64 line mangled
          # in the secret store ("base64 conversion failed" at sign time).
          printf '%s' "$MINISIGN_SECRET_KEY" | base64 -d > minisign.key 2>/dev/null \
            || { echo "::error::MINISIGN_SECRET_KEY must be the base64 of the key file: base64 -w0 minisign.key"; exit 1; }
          minisign -S -s minisign.key -m release/SHA256SUMS -x release/SHA256SUMS.minisig < /dev/null
          rm -f minisign.key
          echo "Signed release/SHA256SUMS -> release/SHA256SUMS.minisig"
      - name: Assert the tag images exist on ghcr
        # release.yml and docker.yml run independently on tag push, but install.sh/
        # update.sh pin ghcr.io/...:X.Y.Z hard. Creating the draft before docker.yml has
        # pushed the images means a human publishing it ships a release whose
        # `install.sh --ref` and `update.sh` fail with 'manifest unknown'. Poll for all
        # four (public images, no login); a red/still-running docker.yml fails THIS
        # workflow instead, so no draft with missing images is ever offered (4.25).
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"
          for img in server gateway ca-issuer monitoring; do
            ok=0
            for _ in $(seq 1 20); do
              if docker manifest inspect "ghcr.io/admincave/adminhelper/${img}:${VER}" >/dev/null 2>&1; then ok=1; break; fi
              sleep 30
            done
            [ "$ok" = 1 ] || { echo "::error::Image ${img}:${VER} missing on ghcr — docker.yml red or still running?"; exit 1; }
            echo "ok: ${img}:${VER}"
          done
      - name: Create draft release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          draft: true
          name: AdminHelper ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: release/*
