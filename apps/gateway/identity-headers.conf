# Verified mTLS client identity, derived from the client cert and forwarded to the
# app. proxy_set_header replaces any inbound header of the same name, so a client
# cannot smuggle these in. Included at server level AND repeated in every location
# that sets its own proxy_set_header — defining any there cancels inheritance of the
# server-level ones, which would otherwise drop the identity (2.28, 4.106).
proxy_set_header X-Client-Verify   $ssl_client_verify;
proxy_set_header X-Client-Cert     $ssl_client_escaped_cert;
proxy_set_header X-Client-Cert-CN  $ssl_client_s_dn;
proxy_set_header Host               $host;
proxy_set_header X-Forwarded-For    $remote_addr;
proxy_set_header X-Forwarded-Proto  $scheme;
