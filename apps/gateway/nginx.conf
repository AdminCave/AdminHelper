# AdminHelper TLS/mTLS gateway (ADR 0001 D11).
# The single public TLS edge for the HTTP planes. Terminates TLS+mTLS,
# forwards the verified client identity to internal-only upstreams. Holds no
# signing key (only the access-signed server leaf + the CA certs for client
# verification) — so a gateway compromise threatens header integrity, not the CA.
# frps is NOT behind this gateway (own protocol, own mTLS edge).

# 1 worker with 512 connections is the nginx default and a hard ceiling under load;
# auto = one worker per core, and a wider per-worker connection budget (5.2).
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Version disclosure off (3.69) + gzip for API JSON and web-UI assets — the repo
    # plane serves already-compressed packages, which these types don't match (5.14).
    server_tokens off;
    gzip on;
    gzip_types application/json application/javascript text/css image/svg+xml;

    # TLS baseline for every plane (Mozilla intermediate ciphers, 3.70) + a shared
    # session cache so repeat agent report/enroll pushes resume instead of doing a
    # full handshake each time (5.17). ssl_protocols stays per-server (already set).
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;
    ssl_session_tickets off;  # Mozilla intermediate: no ticket-key rotation, so off; the cache resumes (1.44)

    # Security headers for every TLS plane: force HTTPS on revisits (HSTS) and stop
    # MIME sniffing. "always" emits them on error responses too. No location defines
    # add_header, so these inherit everywhere (3.23).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Internal-only upstreams (resolved on the compose network; no host ports).
    upstream app {
        server server:8080;
    }
    upstream issuer {
        server ca-issuer:8090;
    }

    # Rate-limit the certless enroll plane (ADR 0003 §5). Enrollment is rare and
    # token-gated (single-use, 10-min TTL), so a tight per-IP limit blunts token
    # brute-force / enroll flooding on the only certless surface without
    # affecting legitimate one-off enrollments. 429 (not the default 503) tells a
    # client it was throttled.
    limit_req_zone $binary_remote_addr zone=enroll:10m rate=10r/s;
    # Renewal takes a verified cert (not fully certless) but must still resist a
    # compromised client hammering the issuer, which parses every PEM — its own
    # tighter drossel (1.15/6.48/3.71).
    limit_req_zone $binary_remote_addr zone=renew:10m rate=5r/s;
    limit_req_status 429;

    # ── Data plane :443 — mTLS ───────────────────────────────────────────────
    # The verify mode (optional vs on) is generated by the entrypoint from the
    # MTLS_ENFORCE env var (A8): "optional" = permissive rollout (default),
    # "on" = CERT_REQUIRED. Either way the app decides per route via the header;
    # flipping is an operator action once every client holds a cert (see docs).
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # Data plane carries app payloads (Ansible playbooks, bulk imports) that can
        # exceed nginx's 1m default and would 413 before reaching the server; the
        # /ca/renew route re-tightens this (4.107).
        client_max_body_size 10m;

        ssl_certificate     /etc/nginx/certs/gateway-fullchain.pem; # access leaf + intermediate
        ssl_certificate_key /etc/nginx/certs/gateway.key;
        ssl_client_certificate /etc/nginx/certs/client-ca.pem;      # root + intermediate (verify clients)
        include /etc/nginx/snippets/data-plane-mtls.conf;           # ssl_verify_client (A8, env-driven)
        ssl_verify_depth 2;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Header hygiene: these are set from the VERIFIED cert and thereby
        # overwrite anything a client tried to smuggle in (proxy_set_header
        # replaces the inbound value of the same name).
        proxy_set_header X-Client-Verify  $ssl_client_verify;
        proxy_set_header X-Client-Cert    $ssl_client_escaped_cert;
        proxy_set_header X-Client-Cert-CN $ssl_client_s_dn;
        proxy_set_header Host             $host;
        proxy_set_header X-Forwarded-For  $remote_addr;

        # Renewal is served by the issuer (it needs the verified client cert,
        # forwarded above as X-Client-Cert / X-Client-Verify).
        location = /ca/renew {
            limit_req zone=renew burst=10 nodelay;
            client_max_body_size 16k;   # a renewal CSR/PEM is a few KB (3.71)
            proxy_pass http://issuer/renew;
        }

        # SSE notification stream: long-lived text/event-stream. nginx must NOT
        # buffer it (events would be delayed) and must not time out an idle
        # stream (the server heartbeats every 15s, well under proxy_read_timeout).
        location = /api/notifications/stream {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";   # keep the upstream connection open
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 1h;
            # Defining proxy_set_header here STOPS inheritance of the server-level
            # ones, so the verified-identity headers the app needs must be
            # repeated (otherwise the stream arrives without an mTLS identity).
            proxy_set_header X-Client-Verify  $ssl_client_verify;
            proxy_set_header X-Client-Cert    $ssl_client_escaped_cert;
            proxy_set_header X-Client-Cert-CN $ssl_client_s_dn;
            proxy_set_header Host             $host;
            proxy_set_header X-Forwarded-For  $remote_addr;
        }

        # Everything else is the application.
        location / {
            proxy_pass http://app;
        }
    }

    # ── Enrollment plane :8444 — certless, token-gated bootstrap doors ───────
    # New clients have no cert yet; TLS still protects the token in transit and
    # the client TOFU-pins the CA here. Two bootstrap doors are exposed: /enroll
    # (ca-issuer) and the agent's provision-activate — both token-gated + certless
    # by design (A8), served here rather than the mTLS data plane (:443) so a fresh
    # agent can bootstrap even under MTLS_ENFORCE=true (which CERT_REQUIREs :443).
    server {
        listen 8444 ssl;
        server_name _;

        # Certless bootstrap doors take tokens + small PEMs (a few KB) — cap the body so a
        # caller can't feed the issuer huge payloads to sidestep the rate drossel (3.71).
        client_max_body_size 16k;

        ssl_certificate     /etc/nginx/certs/gateway-fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/gateway.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Strip any inbound client-identity headers — this plane is certless and
        # must never let a caller assert an identity.
        proxy_set_header X-Client-Verify "";
        proxy_set_header X-Client-Cert    "";
        proxy_set_header X-Client-Cert-CN "";

        location = /enroll {
            limit_req zone=enroll burst=20 nodelay;
            proxy_pass http://issuer/enroll;
        }

        # Agent provision-activate: redeems the single-use provision token (its only
        # auth) and hands back the read-scoped API key + a one-time enroll grant. The
        # app applies NO mTLS scope guard here (bootstrap door); identity headers are
        # re-stripped since defining proxy_set_header stops server-level inheritance.
        location ~ ^/api/servers/[^/]+/provision/activate$ {
            limit_req zone=enroll burst=20 nodelay;
            proxy_set_header X-Client-Verify "";
            proxy_set_header X-Client-Cert    "";
            proxy_set_header X-Client-Cert-CN "";
            proxy_set_header Host             $host;
            proxy_set_header X-Forwarded-For  $remote_addr;
            proxy_pass http://app;
        }

        location / {
            return 404;
        }
    }

    # ── Repo plane :8445 — certless static APT/RPM repo for the agent ─────────
    # Serves the GPG-signed package repo (apt + rpm) so agent hosts can run
    # `apt upgrade` / `dnf upgrade`. Authenticity comes from the repo's OpenPGP
    # signature (InRelease / repomd.xml.asc), NOT the transport — TLS only adds
    # integrity, and the client pins this gateway's CA per-repo (apt CAInfo /
    # dnf sslcacert), never system-wide. Certless on purpose: a host that is not
    # yet enrolled must still be able to fetch the agent package to bootstrap.
    # Content is a read-only bind mount (host ./repo) the updater populates; a
    # missing/empty mount simply 404s (nginx checks the root per request).
    server {
        listen 8445 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/gateway-fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/gateway.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        root /usr/share/nginx/repo;
        default_type application/octet-stream;
        autoindex off;

        # Only the two repo subtrees are reachable; everything else is 404.
        location ~ ^/(apt|rpm)/ {
        }
        location / {
            return 404;
        }
    }
}
