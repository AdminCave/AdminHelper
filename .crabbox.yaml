profile: AdminHelper-check
class: beast
capacity:
  market: spot
  strategy: most-available
  fallback: on-demand-after-120s
actions:
  workflow: .github/workflows/crabbox.yml
  job: hydrate
  runnerLabels:
    - crabbox
  runnerVersion: latest
  ephemeral: true
sync:
  delete: true
  checksum: false
  gitSeed: true
  fingerprint: true
  timeout: 15m
  warnFiles: 50000
  warnBytes: 5368709120
  failFiles: 150000
  failBytes: 21474836480
  exclude:
    # keep .git (gitSeed uses it); exclude generated/heavy trees so rsync stays fast
    - .cache
    - .turbo
    - dist
    - node_modules
    - target
    - .venv
    - __pycache__
    - "*.pyc"
    - .pytest_cache
    - .ruff_cache
    - coverage
    - apps/web/test-results
    - apps/web/playwright-report
    - apps/web/playwright/.cache
    - apps/server/data
    - backups
    - .crabbox
env:
  allow:
    - CI
    - NODE_OPTIONS
ssh:
  user: crabbox
  port: "2222"
  # Ordered fallback ports tried after ssh.port; use [] to disable fallback.
  fallbackPorts:
    - "22"
cache:
  # Optional provider-backed cache volumes. Keep paths outside the synced source tree.
  volumes: []
